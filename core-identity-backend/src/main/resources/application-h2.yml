spring:
  datasource:
    url: jdbc:h2:mem:core_identity;DB_CLOSE_DELAY=-1;MODE=MySQL
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true
  flyway:
    enabled: true
    locations: classpath:db/migration/mysql
    baseline-on-migrate: true

core:
  database:
    type: h2
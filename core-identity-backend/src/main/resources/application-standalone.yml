# ============================================================================
# P7 Standalone Profile — single instance, SQLite, no external dependencies
# Active by default. Zero-config startup for dev, demo, and small deployments.
# ============================================================================
spring:
  datasource:
    url: jdbc:sqlite:./data/core-identity.db
    driver-class-name: org.sqlite.JDBC
  flyway:
    enabled: true
    locations: classpath:db/migration/sqlite
    baseline-on-migrate: true

core:
  database:
    type: sqlite
  deployment:
    mode: standalone
  cache:
    type: caffeine
  session:
    store-type: database
  outbox:
    relay:
      enabled: false
  cluster:
    enabled: false
  observability:
    traces:
      enabled: false
    metrics:
      export: false
spring:
  datasource:
    url: jdbc:mysql://localhost:3306/core_identity?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: ${MYSQL_USER:root}
    password: ${MYSQL_PASSWORD:root}
  flyway:
    enabled: true
    locations: classpath:db/migration/mysql
    baseline-on-migrate: true

core:
  database:
    type: mysql
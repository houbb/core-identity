spring:
  application:
    name: core-identity-backend

server:
  port: 8101

core:
  identity:
    instance-name: Core Identity
    edition: COMMUNITY
  internal-auth:
    issuer: core-identity
    token-ttl-seconds: 600
    signing-key: ${CORE_INTERNAL_SIGNING_KEY:dev-signing-key-at-least-256-bits-long-for-hs256}
  oauth:
    issuer-base: ${CORE_OAUTH_ISSUER_BASE:http://localhost:8101}
    master-key: ${CORE_MASTER_KEY:dev-master-key-32-bytes-for-aes256!}
    access-token-ttl-seconds: 900
    refresh-token-ttl-seconds: 604800
    auth-code-ttl-seconds: 120
    id-token-ttl-seconds: 600
  outbox:
    enabled: true
    poll-interval: 5s
    max-attempts: 5
  idempotency:
    record-ttl-hours: 24
  login:
    max-failed-attempts: 5
    lock-duration: 15m
    ip-rate-limit: 20
    ip-rate-window: 1m
  session:
    idle-timeout-hours: 2
    absolute-timeout-hours: 24
  password:
    min-length: 8
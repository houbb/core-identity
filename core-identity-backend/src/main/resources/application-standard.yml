# ============================================================================
# P7 Standard Profile — MySQL, optional Redis, Outbox HTTP relay
# Suitable for small-medium teams and single-region production.
# ============================================================================
spring:
  datasource:
    url: jdbc:mysql://localhost:3306/core_identity?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: ${MYSQL_USER:root}
    password: ${MYSQL_PASSWORD:root}
  flyway:
    enabled: true
    locations: classpath:db/migration/mysql
    baseline-on-migrate: true

core:
  database:
    type: mysql
  deployment:
    mode: standard
  cache:
    type: ${CORE_CACHE_TYPE:caffeine}
  session:
    store-type: ${CORE_SESSION_STORE_TYPE:database}
  outbox:
    relay:
      enabled: true
      poll-interval: 5s
      max-attempts: 5
  cluster:
    enabled: true
  observability:
    traces:
      enabled: ${CORE_TRACES_ENABLED:false}
    metrics:
      export: ${CORE_METRICS_EXPORT:false}
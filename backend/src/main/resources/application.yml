server:
  port: 9001

spring:
  application:
    name: core-identity-backend
  datasource:
    url: jdbc:sqlite:data/core-identity.db
    driver-class-name: org.sqlite.JDBC
  jpa:
    database-platform: org.hibernate.community.dialect.SQLiteDialect
    hibernate:
      ddl-auto: update
    show-sql: false
    open-in-view: false

# JWT Configuration
# TODO: migrate to core-config in future phases
jwt:
  secret: core-identity-jwt-secret-key-change-in-production-must-be-at-least-256-bits
  access-token-expiration: 900000        # 15 minutes
  refresh-token-expiration: 604800000    # 7 days

logging:
  level:
    com.coreplatform.identity: DEBUG
    org.springframework.security: INFO
openapi: "3.0.3"
info:
  title: Core Identity Events
  version: "0.1.0"
  description: Domain events emitted by core-identity-backend via outbox.
paths: {}
components:
  schemas:
    IdentityEvent:
      type: object
      properties:
        eventId: { type: string }
        eventType: { type: string }
        eventVersion: { type: integer }
        aggregateType: { type: string }
        aggregateId: { type: string }
        payload: { type: object }
        timestamp: { type: string }
    EventTypes:
      type: string
      enum:
        - identity.instance.started
        - identity.internal.token.issued
        - identity.audit.recorded